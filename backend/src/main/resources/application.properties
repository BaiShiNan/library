spring.application.name=digital-library-backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/digital_library?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# MyBatis-Plus Configuration
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true

# JWT Configuration
jwt.secret=YourSecretKeyForJwtSigningMustBeLongEnoughToBeSecureAndAtLeast256Bits
jwt.expiration=86400000

# Logging
logging.level.com.library.backend=DEBUG

# File Upload Configuration
file.upload-dir=f:/Project/library/library/backend/src/main/java/com/library/backend/document
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
