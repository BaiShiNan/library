spring.application.name=digital-library-backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/digital_library?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.library.backend.entity

# PageHelper Configuration
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true

# JWT Configuration
jwt.secret=YourSecretKeyForJwtSigningMustBeLongEnoughToBeSecureAndAtLeast256Bits
jwt.expiration=86400000

# Logging
logging.level.com.library.backend=DEBUG
logging.level.com.library.backend.mapper=DEBUG

# File Upload Configuration
file.upload-dir=f:/Project/library/library/backend/src/main/java/com/library/backend/document
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB

# HTTP Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
