spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.library.backend.entity
logging.level.com.library.backend.mapper=DEBUG

jwt.secret=YourSecretKeyForJwtSigningMustBeLongEnoughToBeSecureAndAtLeast256Bits
jwt.expiration=86400000
file.upload-dir=target/uploads
